<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL Auction — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-center">
    <div class="card login-card">
      <div class="login-logo">IPL Auction</div>
      <div class="login-subtitle">Private Franchise Auction System</div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email"
            placeholder="team@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password"
            placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div id="auth-error" class="error-msg"></div>
        <button class="btn btn-gold btn-full mt-8" type="submit" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabaseClient.js?v=15"></script>
  <script src="js/auth.js?v=15"></script>
</body>
</html>
