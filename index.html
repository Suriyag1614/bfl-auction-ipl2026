<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFL IPL 2026 — Login</title>
  <link rel="stylesheet" href="css/styles.css?v=36">
  <style>
    /* Only rules-specific styles that don't exist in styles.css */
    @keyframes float-emoji { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes logo-reveal  { from{opacity:0;transform:scale(.4) rotate(-20deg)} to{opacity:1;transform:none} }
    @keyframes bar-fill     { from{width:0} to{width:100%} }
    @keyframes cfetti       { 0%{opacity:1;transform:translateY(-10px) rotate(0)} 100%{opacity:0;transform:translateY(70px) rotate(540deg)} }

    .bfl-emoji   { font-size:64px; display:block; line-height:1; text-align:center; margin-bottom:6px; animation:float-emoji 2.5s ease infinite; }
    .bfl-logo    { font-family:'Barlow Condensed',sans-serif; font-size:46px; font-weight:800; letter-spacing:6px; color:var(--gold); text-transform:uppercase; text-align:center; text-shadow:0 0 36px var(--gold-glow); animation:glow-gold 3s ease infinite; }
    .bfl-sub     { text-align:center; color:var(--muted); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:24px; }
    .bfl-divider { height:1px; background:var(--border); margin:0 0 20px; }

    .role-tabs   { display:flex; gap:4px; background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:20px; }
    .role-tab    { flex:1; padding:9px 0; text-align:center; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); border:none; background:transparent; border-radius:9px; cursor:pointer; transition:all .2s; }
    .role-tab.active { background:var(--gold); color:#000; box-shadow:0 2px 12px rgba(240,180,41,.4); }

    .sel-wrap    { position:relative; }
    .sel-icon    { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:20px; pointer-events:none; z-index:1; }
    .sel-wrap select { width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:10px 40px 10px 44px; color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; outline:none; appearance:none; cursor:pointer; transition:border-color .2s; }
    .sel-wrap select:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-glow); }
    .sel-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:12px; }
    .ipl-badge   { position:absolute; right:32px; top:50%; transform:translateY(-50%); width:26px; height:26px; object-fit:contain; opacity:0; pointer-events:none; transition:opacity .3s; z-index:1; }
    .ipl-badge.show { opacity:.85; }

    .pwd-wrap    { position:relative; }
    .pwd-wrap .form-input { padding-right:42px; letter-spacing:2px; }
    .pwd-wrap .form-input::placeholder { letter-spacing:0; }
    .pwd-toggle  { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:4px; }

    .ws-chip     { background:rgba(240,180,41,.08); border:1px solid rgba(240,180,41,.2); border-radius:8px; padding:8px 14px; text-align:center; }
    .ws-chip strong { color:var(--gold); display:block; font-size:18px; font-weight:800; font-family:'Barlow Condensed',sans-serif; }
    .ws-chip span   { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.8px; }
    .w-bar-wrap  { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .w-bar       { height:100%; background:var(--gold); border-radius:2px; width:0; }

    .rules-card  { background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:18px 16px; min-height:190px; }
    .rules-step  { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:5px; }
    .rules-title { font-family:'Barlow Condensed',sans-serif; font-size:19px; font-weight:800; color:var(--gold); margin-bottom:10px; line-height:1.2; }
    .rules-body  { font-size:13px; color:#a0aec0; line-height:1.65; }
    .rules-body strong { color:#e2e8f0; }
    .rules-body ul { margin:6px 0 6px 14px; padding:0; }
    .rules-body li { margin-bottom:3px; }
    .rule-tag    { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:700; font-family:'Barlow Condensed',sans-serif; text-transform:uppercase; letter-spacing:.5px; margin:0 2px; vertical-align:middle; }
    .rtag-gold   { background:rgba(240,180,41,.15); color:var(--gold); border:1px solid rgba(240,180,41,.3); }
    .rtag-blue   { background:rgba(59,130,246,.15);  color:#93c5fd;    border:1px solid rgba(59,130,246,.3); }
    .rtag-red    { background:rgba(229,62,62,.15);   color:#fc8181;    border:1px solid rgba(229,62,62,.3); }
    .rtag-green  { background:rgba(56,161,105,.15);  color:#68d391;    border:1px solid rgba(56,161,105,.3); }
    .rtag-purple { background:rgba(139,92,246,.15);  color:#c4b5fd;    border:1px solid rgba(139,92,246,.3); }

    .rules-dots  { display:flex; gap:5px; align-items:center; justify-content:center; margin:10px 0; }
    .rules-dot   { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.15); transition:all .2s; cursor:pointer; }
    .rules-dot.active { background:var(--gold); transform:scale(1.4); }

    .rules-nav   { display:flex; gap:8px; }
    .rules-btn   { flex:1; padding:10px 0; border:1px solid rgba(255,255,255,.1); border-radius:8px; background:transparent; color:#a0aec0; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; transition:all .18s; }
    .rules-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); }
    .rules-btn:disabled { opacity:.2; cursor:not-allowed; }
    .rules-btn.finish   { background:var(--gold); color:#000; border-color:var(--gold); box-shadow:0 4px 20px rgba(240,180,41,.35); }
    .rules-btn.finish:hover:not(:disabled) { background:var(--gold); color:#000 !important; }

    /* Fix: btn-gold hover must keep text black, not gold-on-gold */
    .btn-gold:hover:not(:disabled) { color:#000 !important; background:var(--gold) !important; }

    /* Skip link under rules nav */
    .rules-skip-link { display:block; text-align:center; margin-top:12px; font-size:11px; color:var(--muted); cursor:pointer; letter-spacing:.8px; text-transform:uppercase; transition:color .18s; }
    .rules-skip-link:hover { color:var(--text2); }

    .clayer { position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
    .cdot   { position:absolute; border-radius:2px; animation:cfetti linear both; }

    .ipl-logo-badge { width:64px; height:64px; object-fit:contain; display:block; margin:0 auto 10px; animation:logo-reveal .6s cubic-bezier(.34,1.56,.64,1) both; animation-delay:.3s; opacity:0; transition:opacity .3s; }
    .ipl-logo-badge.loaded { opacity:1; }
  </style>
</head>
<body>
<div class="clayer" id="clayer"></div>

<div class="page-center">
  <div class="card login-card">

    <!-- LOGO -->
    <div class="bfl-logo">BFL</div>
    <div class="login-subtitle">IPL 2026 Fantasy Auction</div>
    <div class="bfl-divider"></div>

    <!-- ══ SCREEN 1: LOGIN ══ -->
    <div id="screen-login">
      <div class="role-tabs">
        <button class="role-tab active" id="tab-team"  onclick="switchRole('team')">My Team</button>
        <button class="role-tab"        id="tab-admin" onclick="switchRole('admin')">Auctioneer</button>
      </div>

      <div class="form-group" id="team-group">
        <label class="form-label">Select Your Franchise</label>
        <div class="sel-wrap">
          <span class="sel-icon" id="sel-icon">BFL</span>
          <select id="team-select" class="form-input" style="padding-left:44px;" onchange="onTeamChange()">
            <option value="">— Loading teams… —</option>
          </select>
          <img id="ipl-badge" class="ipl-badge" src="" alt="">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" id="pwd-label">Team Password</label>
        <div class="pwd-wrap">
          <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <button class="pwd-toggle" type="button" onclick="togglePwd()" id="pwd-eye"></button>
        </div>
      </div>

      <div id="auth-error" class="error-msg" style="text-align:center;margin-bottom:10px;"></div>

      <button class="btn btn-gold btn-full" id="login-btn" onclick="doLogin()">
        Enter Auction Room
      </button>
      <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--muted);letter-spacing:.5px;">
        BFL Fantasy Cricket · Private System
      </div>
    </div>

    <!-- ══ SCREEN 2: WELCOME SPLASH ══ -->
    <div id="screen-welcome" style="display:none;text-align:center;">
      <span class="bfl-emoji" id="w-emoji"></span>
      <img id="w-ipl-logo" class="ipl-logo-badge" src="" alt="">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:4px;" id="w-title">Welcome!</div>
      <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px;" id="w-team"></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;" id="w-stats"></div>
      <div class="w-bar-wrap" id="w-bar-wrap" style="display:none;margin-bottom:8px;">
        <div class="w-bar" id="w-bar"></div>
      </div>
      <div id="w-redir" style="display:none;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;"></div>
      <div id="w-rules-btn-wrap">
        <button class="btn btn-gold btn-full" onclick="showRules()" style="font-size:16px;margin-top:4px;">
          View Rules &amp; Enter Auction Room →
        </button>
      </div>
    </div>

    <!-- ══ SCREEN 3: RULES CAROUSEL ══ -->
    <div id="screen-rules" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;"> Auction Rules</span>
        <span id="rules-page-lbl" style="font-size:11px;color:var(--muted);">1 / 8</span>
      </div>
      <div id="rules-card" class="rules-card"></div>
      <div class="rules-dots" id="rules-dots"></div>
      <div class="rules-nav">
        <button class="rules-btn" id="rules-prev" onclick="rulesNav(-1)">← Prev</button>
        <button class="rules-btn" id="rules-next" onclick="rulesNav(1)">Next →</button>
      </div>
      <span class="rules-skip-link" onclick="window.location.href='auction.html'">Skip &amp; Enter Directly →</span>
    </div>

  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabaseClient.js?v=36"></script>
<script>
'use strict';

var _role  = 'team';
var _teams = [];

// ── Helpers ───────────────────────────────────────────────────
var IPL_LOGO = function(c){ return 'images\\' + c + 'outline.png'; };
var EMOJIS = [['GUJARAT','⚡'],['MUMBAI',''],['PUNJAB','♦️'],['CHENNAI',''],['KOLKATA',''],['DELHI',''],['RAJASTHAN',''],['SUNRISERS',''],['ROYAL',''],['LUCKNOW','']];
var ICODES = [['GUJARAT','GT'],['MUMBAI','MI'],['PUNJAB','PBKS'],['CHENNAI','CSK'],['KOLKATA','KKR'],['DELHI','DC'],['RAJASTHAN','RR'],['SUNRISERS','SRH'],['ROYAL','RCB'],['LUCKNOW','LSG']];
function teamEmoji(n){ var u=(n||'').toUpperCase(); var m=EMOJIS.find(function(x){return u.includes(x[0]);}); return m?m[1]:''; }
function teamCode(n) { var u=(n||'').toUpperCase(); var m=ICODES.find(function(x){return u.includes(x[0]);}); return m?m[1]:null; }

function el(id){ return document.getElementById(id); }

// ── Screen management ─────────────────────────────────────────
// Only one of the three screens is visible at a time
function showScreen(name) {
  el('screen-login').style.display   = name==='login'   ? '' : 'none';
  el('screen-welcome').style.display = name==='welcome' ? '' : 'none';
  el('screen-rules').style.display   = name==='rules'   ? '' : 'none';
}

// ── Init ──────────────────────────────────────────────────────
(function(){
  // Make sure login is visible immediately in case JS fails later
  showScreen('login');
})();

(async function init(){
  try {
    var session = (await sb.auth.getSession()).data.session;
    if (session) {
      await autoRedirect(session.user);
    } else {
      await loadTeams();
      showScreen('login');
    }
  } catch(e) {
    console.error('Init error:', e);
    showScreen('login');
  }
})();

// ── Load teams ────────────────────────────────────────────────
async function loadTeams() {
  try {
    var res = await sb.from('teams_public').select('id,team_name').order('team_name');
    if (res.error) res = await sb.from('teams').select('id,team_name').order('team_name');
    _teams = res.data || [];
  } catch(e) { _teams = []; }
  var sel = el('team-select');
  sel.innerHTML = '<option value="">— Pick your team —</option>' +
    _teams.map(function(t){ return '<option value="'+t.id+'">'+t.team_name+'</option>'; }).join('');
}

// ── Role switcher ─────────────────────────────────────────────
function switchRole(r) {
  _role = r;
  el('tab-team').classList.toggle('active', r==='team');
  el('tab-admin').classList.toggle('active', r==='admin');
  el('team-group').style.display = r==='team' ? '' : 'none';
  el('pwd-label').textContent    = r==='admin' ? 'Auctioneer Password' : 'Team Password';
  el('login-btn').textContent    = r==='admin' ? 'Enter Auction Control' : 'Enter Auction Room';
  el('auth-error').textContent   = '';
  if (r==='admin') el('ipl-badge').classList.remove('show');
}

function onTeamChange() {
  var sel  = el('team-select');
  var name = (sel.options[sel.selectedIndex]||{}).text || '';
  el('sel-icon').textContent = teamEmoji(name);
  var c = teamCode(name);
  if (c) { el('ipl-badge').src = IPL_LOGO(c); el('ipl-badge').classList.add('show'); }
  else   { el('ipl-badge').classList.remove('show'); }
}

function togglePwd() {
  var i = el('password'), e = el('pwd-eye');
  i.type = i.type==='password' ? 'text' : 'password';
  e.textContent = i.type==='text' ? '●' : '○';
}

// ── Login ─────────────────────────────────────────────────────
async function doLogin() {
  var errEl = el('auth-error');
  var btn   = el('login-btn');
  var pwd   = el('password').value;
  errEl.textContent = '';

  if (!pwd) { errEl.textContent = 'Please enter your password.'; return; }

  if (_role === 'team') {
    var tid = el('team-select').value;
    if (!tid) { errEl.textContent = 'Please select your team first.'; return; }
    btn.disabled = true; btn.textContent = 'Signing in…';

    var tname  = (_teams.find(function(t){return t.id===tid;})||{}).team_name || tid;
    var temail = tname.toLowerCase().replace(/\s+/g,'_') + '@bfl.in';
    var res    = await sb.auth.signInWithPassword({ email:temail, password:pwd });
    if (res.error) {
      errEl.textContent = 'Incorrect password. Contact the auctioneer.';
      btn.disabled = false; btn.textContent = 'Enter Auction Room'; return;
    }
    await showWelcome('team', _teams.find(function(t){return t.id===tid;}));

  } else {
    btn.disabled = true; btn.textContent = 'Signing in…';
    var res2 = await sb.auth.signInWithPassword({ email:'admin@bfl.in', password:pwd });
    if (res2.error) {
      errEl.textContent = 'Incorrect auctioneer password.';
      btn.disabled = false; btn.textContent = 'Enter Auction Control'; return;
    }
    await showWelcome('admin', null);
  }
}

// ── Auto-redirect for already-logged-in users ─────────────────
async function autoRedirect(user) {
  if ((user.app_metadata && user.app_metadata.role==='admin') || user.email==='admin@bfl.in') {
    window.location.href = 'admin.html'; return;
  }
  try {
    var res = await sb.from('teams').select('*').eq('user_id', user.id).maybeSingle();
    if (res.data) {
      await loadTeams();
      await showWelcome('team', res.data);
      return;
    }
  } catch(e) {}
  await sb.auth.signOut();
  showScreen('login');
}

// ── Welcome splash ────────────────────────────────────────────
async function showWelcome(userRole, team) {
  spawnConfetti();

  if (userRole === 'admin') {
    showScreen('welcome');
    el('w-emoji').textContent = '⚙️';
    el('w-title').textContent = 'Welcome, Auctioneer!';
    el('w-team').textContent  = 'BFL IPL 2026 Control Room';
    el('w-stats').innerHTML   =
      '<div class="ws-chip"><strong>Admin</strong><span>Host</span></div>' +
      '<div class="ws-chip"><strong>Full</strong><span>Access</span></div>';
    el('w-redir').textContent  = 'Loading auction control…';
    el('w-redir').style.display = '';
    el('w-bar-wrap').style.display = '';
    el('w-rules-btn-wrap').style.display = 'none';
    animateBar(2000);
    setTimeout(function(){ window.location.href='admin.html'; }, 2200);
    return;
  }

  showScreen('welcome');
  var name = (team && team.team_name) || 'Your Team';
  el('w-emoji').textContent = teamEmoji(name);
  el('w-title').textContent = 'Welcome Back!';
  el('w-team').textContent  = name;

  var c = teamCode(name);
  if (c) {
    var logo = el('w-ipl-logo');
    logo.src = IPL_LOGO(c);
    logo.style.display = 'block';
    logo.onload = function(){ logo.classList.add('loaded'); };
  }

  try {
    var td = (await sb.rpc('get_my_team')).data;
    if (td && td.found) {
      var purse  = Number(td.purse_remaining).toFixed(1);
      var rtmRem = Math.max(0,(td.rtm_cards_total||0)-(td.rtm_cards_used||0));
      el('w-stats').innerHTML =
        '<div class="ws-chip"><strong>₹'+purse+'</strong><span>Purse (Cr)</span></div>' +
        '<div class="ws-chip"><strong>'+(td.player_count||0)+'/12</strong><span>Players</span></div>' +
        '<div class="ws-chip"><strong>'+rtmRem+'</strong><span>RTM Cards</span></div>';
    }
  } catch(_) {}
}

function animateBar(ms) {
  var b = el('w-bar'); if (!b) return;
  b.style.animation = 'none'; void b.offsetHeight;
  b.style.animation = 'bar-fill '+(ms/1000)+'s ease forwards';
}

// ── Confetti ──────────────────────────────────────────────────
function spawnConfetti() {
  var layer = el('clayer');
  var cols  = ['#f0b429','#38a169','#3b82f6','#8b5cf6','#e53e3e','#f97316'];
  for (var i=0;i<50;i++) {
    (function(){
      var d = document.createElement('div');
      var s = 5+Math.random()*8;
      d.className = 'cdot';
      d.style.cssText = 'left:'+Math.random()*100+'vw;top:'+Math.random()*55+'vh;width:'+s+'px;height:'+s+'px;background:'+cols[~~(Math.random()*cols.length)]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';animation-delay:'+Math.random()*.7+'s;animation-duration:'+(0.7+Math.random()*.9)+'s;';
      layer.appendChild(d);
      setTimeout(function(){ d.remove(); }, 2000);
    })();
  }
}

// ── Rules carousel ────────────────────────────────────────────
var _ri = 0; // current rule index

var RULES = [
  { step:'Overview', title:'Welcome to BFL IPL 2026 Auction',
    body:'You are a <strong>franchise owner</strong> competing to build the best IPL squad within your budget.<ul>' +
         '<li>Each team starts with a <span class="rule-tag rtag-gold">₹100 Cr purse</span></li>' +
         '<li>Sign exactly <span class="rule-tag rtag-blue">12 players</span> to complete your squad</li>' +
         '<li>Auction runs in individual slots and <strong>set auctions</strong> (simultaneous bidding)</li>' +
         '<li>The auctioneer controls the pace — watch the screen at all times</li>' +
         '<li>Real-money free fantasy game — for bragging rights only </li></ul>' },

  { step:'Purse & Bidding', title:'Purse & How to Bid',
    body:'<ul><li>Your remaining purse is shown in the <strong>top-right corner</strong> at all times</li>' +
         '<li>Minimum bid increment is <span class="rule-tag rtag-gold">₹0.25 Cr</span> per step</li>' +
         '<li>Bid input auto-fills the minimum valid next bid — you can raise it</li>' +
         '<li>Press <strong>Enter</strong> or tap <strong>Bid</strong> to submit</li>' +
         '<li>If outbid, the bid button reappears immediately — be fast!</li>' +
         '<li>You can <span class="rule-tag rtag-red">Undo</span> your own bid once before the next bid arrives</li>' +
         '<li>You cannot bid if your purse is too low or squad limits would be exceeded</li></ul>' },

  { step:'Squad Rules', title:'Building Your Squad',
    body:'Your 12-player squad must satisfy IPL composition rules:<ul>' +
         '<li><span class="rule-tag rtag-blue">Min 1</span> Wicket-Keeper (WK)</li>' +
         '<li><span class="rule-tag rtag-blue">Min 2</span> Batters (BAT)</li>' +
         '<li><span class="rule-tag rtag-blue">Min 3</span> Bowlers (BOWL)</li>' +
         '<li><span class="rule-tag rtag-blue">Min 2</span> All-Rounders (AR)</li>' +
         '<li><span class="rule-tag rtag-blue">Min 1</span> Uncapped player (UC)</li>' +
         '<li><span class="rule-tag rtag-red">Max 4</span> Overseas players (OS)</li>' +
         '<li><span class="rule-tag rtag-red">Max 3</span> from any single IPL franchise</li></ul>' +
         'The <strong>Squad Composition bar</strong> on your sidebar shows real-time status.' },

  { step:'Retentions & RTM', title:'Retentions & Right to Match',
    body:'<ul><li><span class="rule-tag rtag-gold">Retained players</span> are pre-assigned — cost already deducted from your purse</li>' +
         '<li>Some teams have <span class="rule-tag rtag-purple">RTM cards</span> (Right to Match) — shown in the navbar</li>' +

function showRules() {
  _ri = 0;
  renderRule();
  // Widen the card slightly for rules content
  var card = document.querySelector('.login-card');
  if (card) card.style.maxWidth = '520px';
  showScreen('rules');
}

function renderRule() {
  var r    = RULES[_ri];
  var card = el('rules-card');
  var dots = el('rules-dots');
  var prev = el('rules-prev');
  var next = el('rules-next');
  var lbl  = el('rules-page-lbl');
  if (!card || !r) return;

  card.innerHTML =
    '<div class="rules-step">'+r.step+'</div>' +
    '<div class="rules-title">'+r.title+'</div>' +
    '<div class="rules-body">'+r.body+'</div>';

  if (lbl) lbl.textContent = (_ri+1)+' / '+RULES.length;

  if (dots) dots.innerHTML = RULES.map(function(_,i){
    return '<div class="rules-dot'+(_ri===i?' active':'')+'" onclick="rulesGoTo('+i+')"></div>';
  }).join('');

  if (prev) prev.disabled = (_ri === 0);
  if (next) {
    var last = (_ri === RULES.length-1);
    next.textContent = last ? 'Enter Auction Room →' : 'Next →';
    if (last) next.classList.add('finish'); else next.classList.remove('finish');
  }
}

function rulesNav(dir) {
  if (dir > 0 && _ri === RULES.length-1) {
    window.location.href = 'auction.html'; return;
  }
  _ri = Math.max(0, Math.min(RULES.length-1, _ri+dir));
  renderRule();
}

function rulesGoTo(i) { _ri = i; renderRule(); }

// ── Keyboard navigation ───────────────────────────────────────
document.addEventListener('keydown', function(e) {
  var login   = el('screen-login').style.display   !== 'none';
  var rules   = el('screen-rules').style.display   !== 'none';
  if (e.key === 'Enter' && login)  { doLogin(); return; }
  if (e.key === 'ArrowRight' && rules) { e.preventDefault(); rulesNav(1);  return; }
  if (e.key === 'ArrowLeft'  && rules) { e.preventDefault(); rulesNav(-1); return; }
});
</script>
