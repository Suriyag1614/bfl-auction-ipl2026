<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFL IPL 2026 — Login</title>
  <link rel="stylesheet" href="css/styles.css?v=25">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:#f0b429;--gold-glow:rgba(240,180,41,0.2);
      --bg:#0b0e18;--bg-input:#0d1020;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.1);
      --text:#e2e8f0;--text2:#94a3b8;--muted:#475569;
      --radius:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Barlow Condensed',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    .bg-atmo{position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 90% 50% at 50% -5%,rgba(240,180,41,.1) 0%,transparent 65%),
                 radial-gradient(ellipse 50% 40% at 10% 100%,rgba(59,130,246,.06) 0%,transparent 60%);}

    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}

    @keyframes card-in{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
    .card{
      width:100%;max-width:430px;
      background:rgba(17,21,32,.97);
      border:1px solid var(--border2);border-radius:20px;
      padding:36px 32px 30px;
      box-shadow:0 40px 80px rgba(0,0,0,.65),0 0 0 1px rgba(240,180,41,.05);
      animation:card-in .45s cubic-bezier(.22,.68,0,1.2) both;
      position:relative;overflow:hidden;
    }
    .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);border-radius:0 0 4px 4px;}

    /* Logo */
    @keyframes glow-pulse{0%,100%{text-shadow:0 0 20px rgba(240,180,41,.3)}50%{text-shadow:0 0 50px rgba(240,180,41,.7),0 0 80px rgba(240,180,41,.2)}}
    .logo-wrap{text-align:center;margin-bottom:20px;}
    .logo-ball{font-size:44px;display:block;line-height:1;margin-bottom:4px;}
    .logo-text{font-size:42px;font-weight:800;letter-spacing:6px;color:var(--gold);text-transform:uppercase;animation:glow-pulse 3s ease infinite;}
    .logo-sub{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;}

    .divider{height:1px;background:var(--border);margin:20px 0;}

    /* Role tabs */
    .role-tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:22px;}
    .role-tab{flex:1;padding:10px 0;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border:none;background:transparent;border-radius:9px;cursor:pointer;transition:all .22s ease;}
    .role-tab:hover:not(.active){color:var(--text2);}
    .role-tab.active{background:var(--gold);color:#000;box-shadow:0 2px 14px rgba(240,180,41,.45);}

    /* Form */
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:7px;}

    /* Select */
    .sel-wrap{position:relative;}
    .sel-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:22px;pointer-events:none;z-index:1;}
    .sel-wrap select{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:12px 42px 12px 46px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color .2s,box-shadow .2s;}
    .sel-wrap select:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
    .sel-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px;}
    .ipl-badge{position:absolute;right:34px;top:50%;transform:translateY(-50%);width:28px;height:28px;object-fit:contain;opacity:0;pointer-events:none;transition:opacity .35s;z-index:1;}
    .ipl-badge.show{opacity:.85;}

    /* Password */
    .pwd-wrap{position:relative;}
    .pwd-wrap input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:12px 44px 12px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;outline:none;letter-spacing:2px;transition:border-color .2s,box-shadow .2s;}
    .pwd-wrap input::placeholder{letter-spacing:0;font-weight:400;color:var(--muted);}
    .pwd-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
    .pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding:4px;transition:color .2s;}
    .pwd-toggle:hover{color:var(--text);}

    .error-msg{font-size:13px;color:#fc8181;min-height:18px;margin-bottom:12px;text-align:center;font-weight:600;}

    /* Button */
    .login-btn{width:100%;padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;background:var(--gold);color:#000;border:none;border-radius:var(--radius);cursor:pointer;box-shadow:0 4px 24px rgba(240,180,41,.3);transition:transform .15s,box-shadow .15s,opacity .15s;}
    .login-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 36px rgba(240,180,41,.5);}
    .login-btn:active:not(:disabled){transform:scale(.98);}
    .login-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
    .footer-note{text-align:center;margin-top:18px;font-size:11px;color:var(--muted);letter-spacing:.5px;}

    /* Welcome */
    @keyframes welcome-in{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes logo-reveal{from{opacity:0;transform:scale(.4) rotate(-20deg)}to{opacity:1;transform:none}}
    @keyframes bar-fill{from{width:0}to{width:100%}}

    #welcome-screen{display:none;text-align:center;animation:welcome-in .55s cubic-bezier(.34,1.56,.64,1) both;}
    .w-emoji{font-size:72px;display:block;line-height:1;margin-bottom:8px;animation:float 2.5s ease infinite;}
    .w-ipl-logo{width:68px;height:68px;object-fit:contain;margin:0 auto 10px;display:none;animation:logo-reveal .6s cubic-bezier(.34,1.56,.64,1) both;animation-delay:.3s;opacity:0;}
    .w-ipl-logo.loaded{opacity:1;}
    .w-title{font-size:34px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:6px;}
    .w-team{font-size:22px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.2;}
    .w-stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:22px;}
    .ws-chip{background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.2);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;}
    .ws-chip strong{color:var(--gold);display:block;font-size:18px;font-weight:800;}
    .ws-chip span{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;}
    .w-bar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px;}
    .w-bar{height:100%;background:var(--gold);border-radius:2px;width:0;}
    .w-redir{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

    /* Confetti */
    @keyframes cfetti{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(70px) rotate(540deg)}}
    .clayer{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
    .cdot{position:absolute;border-radius:2px;animation:cfetti linear both;}

    @media(max-width:480px){.card{padding:26px 18px 24px;}.logo-text{font-size:34px;}}

    /* ── Rules card ── */
    .rules-card{
      background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;padding:20px 18px;margin-bottom:14px;
      min-height:260px;animation:card-in 0.3s ease both;
    }
    .rules-step{
      font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
      color:var(--muted);margin-bottom:6px;
    }
    .rules-title{
      font-size:20px;font-weight:800;color:var(--gold);
      margin-bottom:10px;line-height:1.2;
    }
    .rules-body{font-size:13px;color:#a0aec0;line-height:1.7;}
    .rules-body strong{color:#e2e8f0;}
    .rules-body ul{margin:8px 0 8px 16px;padding:0;}
    .rules-body li{margin-bottom:4px;}
    .rules-body .rule-tag{
      display:inline-block;padding:1px 7px;border-radius:4px;
      font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
      text-transform:uppercase;letter-spacing:0.5px;margin:1px 2px;
      vertical-align:middle;
    }
    .tag-gold{background:rgba(240,180,41,0.15);color:var(--gold);border:1px solid rgba(240,180,41,0.3);}
    .tag-blue{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);}
    .tag-red {background:rgba(229,62,62,0.15); color:#fc8181;border:1px solid rgba(229,62,62,0.3);}
    .tag-green{background:rgba(56,161,105,0.15);color:#68d391;border:1px solid rgba(56,161,105,0.3);}
    .tag-purple{background:rgba(139,92,246,0.15);color:#c4b5fd;border:1px solid rgba(139,92,246,0.3);}
    .rules-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .rules-nav-btn{
      padding:8px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;
      background:transparent;color:#a0aec0;cursor:pointer;
      font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
      text-transform:uppercase;letter-spacing:0.5px;
      transition:all 0.18s;white-space:nowrap;
    }
    .rules-nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
    .rules-nav-btn:disabled{opacity:0.25;cursor:not-allowed;}
    .rules-nav-btn.finish{background:var(--gold);color:#000;border-color:var(--gold);}
    .rules-nav-btn.finish:hover{box-shadow:0 4px 20px rgba(240,180,41,0.4);}
    .rules-dots{display:flex;gap:6px;align-items:center;}
    .rules-dot{
      width:7px;height:7px;border-radius:50%;
      background:rgba(255,255,255,0.15);transition:all 0.2s;cursor:pointer;
    }
    .rules-dot.active{background:var(--gold);transform:scale(1.3);}
  </style>
</head>
<body>
<div class="bg-atmo"></div>
<div class="clayer" id="clayer"></div>

<div class="page">
  <div class="card">

    <div class="logo-wrap">
      <span class="logo-ball">🏏</span>
      <div class="logo-text">BFL</div>
      <div class="logo-sub">IPL 2026 Fantasy Auction</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-screen">
      <div class="divider"></div>

      <div class="role-tabs">
        <button class="role-tab active" id="tab-team"  onclick="switchRole('team')">🏆 My Team</button>
        <button class="role-tab"        id="tab-admin" onclick="switchRole('admin')">⚙️ Auctioneer</button>
      </div>

      <div class="form-group" id="team-group">
        <label class="form-label">Select Your Franchise</label>
        <div class="sel-wrap">
          <span class="sel-icon" id="sel-icon">🏏</span>
          <select id="team-select" onchange="onTeamChange()">
            <option value="">— Loading teams… —</option>
          </select>
          <img id="ipl-badge" class="ipl-badge" src="" alt="">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" id="pwd-label">Team Password</label>
        <div class="pwd-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <button class="pwd-toggle" type="button" onclick="togglePwd()" id="pwd-eye">👁</button>
        </div>
      </div>

      <div class="error-msg" id="auth-error"></div>

      <button class="login-btn" id="login-btn" onclick="doLogin()">Enter Auction Room</button>
      <div class="footer-note">BFL Fantasy Cricket · Private System</div>
    </div>

    <!-- WELCOME / RULES SCREEN -->
    <div id="welcome-screen">

      <!-- Step 1: Welcome splash -->
      <div id="ws-splash">
        <span class="w-emoji" id="w-emoji">🏆</span>
        <img id="w-ipl-logo" class="w-ipl-logo" src="" alt="">
        <div class="w-title" id="w-title">Welcome!</div>
        <div class="w-team"  id="w-team"></div>
        <div class="w-stats" id="w-stats"></div>
        <div style="margin-top:20px;">
          <button class="login-btn" id="rules-btn" onclick="showRules()"
            style="font-size:15px;padding:11px;">
            📋 View Rules &amp; Start →
          </button>
        </div>
      </div>

      <!-- Step 2: Rules carousel -->
      <div id="ws-rules" style="display:none;text-align:left;">
        <div id="rules-card" class="rules-card"></div>
        <div class="rules-nav">
          <button class="rules-nav-btn" id="rules-prev" onclick="rulesNav(-1)">← Prev</button>
          <div class="rules-dots" id="rules-dots"></div>
          <button class="rules-nav-btn" id="rules-next" onclick="rulesNav(1)">Next →</button>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="js/supabaseClient.js?v=25"></script>
<script>
let role = 'team';
let teams = [];

const IPL_LOGO = c => c ? `https://documents.iplt20.com/ipl/${c}/logos/LogoOutline/${c}outline.png` : null;

const EMOJI = [
  ['GUJARAT','⚡'],['MUMBAI',''],['PUNJAB','♦️'],['CHENNAI','🦁'],
  ['KOLKATA','💜'],['DELHI','🔷'],['RAJASTHAN','💙'],['SUNRISERS','🟠'],
  ['ROYAL','🔴'],['SUPREME','👑'],['LUCKNOW','🌊'],
];
const CODES = [
  ['GUJARAT','GT'],['MUMBAI','MI'],['PUNJAB','PBKS'],['CHENNAI','CSK'],
  ['KOLKATA','KKR'],['DELHI','DC'],['RAJASTHAN','RR'],['SUNRISERS','SRH'],
  ['ROYAL','RCB'],['LUCKNOW','LSG'],
];
const emoji = n => { const u=(n||'').toUpperCase(); const m=EMOJI.find(([k])=>u.includes(k)); return m?m[1]:'🏏'; };
const code  = n => { const u=(n||'').toUpperCase(); const m=CODES.find(([k])=>u.includes(k)); return m?m[1]:null; };

// ── Init ──────────────────────────────────────────────────────
(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) { await autoRedirect(session.user); return; }
  await loadTeams();
})();

async function loadTeams() {
  // Try teams_public view first (created in 03_auth_setup.sql)
  let { data, error } = await sb.from('teams_public').select('id,team_name').order('team_name');
  if (error) ({ data } = await sb.from('teams').select('id,team_name').order('team_name'));
  teams = data || [];
  const sel = document.getElementById('team-select');
  sel.innerHTML = '<option value="">— Pick your team —</option>' +
    teams.map(t => `<option value="${t.id}">${t.team_name}</option>`).join('');
}

function switchRole(r) {
  role = r;
  document.getElementById('tab-team').classList.toggle('active', r==='team');
  document.getElementById('tab-admin').classList.toggle('active', r==='admin');
  document.getElementById('team-group').style.display = r==='team' ? '' : 'none';
  document.getElementById('pwd-label').textContent    = r==='admin' ? 'Auctioneer Password' : 'Team Password';
  document.getElementById('login-btn').textContent    = r==='admin' ? 'Enter Auction Control' : 'Enter Auction Room';
  document.getElementById('sel-icon').textContent     = r==='admin' ? '⚙️' : '🏏';
  document.getElementById('auth-error').textContent   = '';
  if (r==='admin') document.getElementById('ipl-badge').classList.remove('show');
}

function onTeamChange() {
  const sel  = document.getElementById('team-select');
  const name = sel.options[sel.selectedIndex]?.text||'';
  document.getElementById('sel-icon').textContent = emoji(name);
  const c = code(name);
  const badge = document.getElementById('ipl-badge');
  if (c) { badge.src = IPL_LOGO(c); badge.classList.add('show'); }
  else   { badge.classList.remove('show'); }
}

function togglePwd() {
  const i = document.getElementById('password');
  const e = document.getElementById('pwd-eye');
  i.type = i.type==='password'?'text':'password';
  e.textContent = i.type==='text'?'🙈':'👁';
}

async function doLogin() {
  const err = document.getElementById('auth-error');
  const btn = document.getElementById('login-btn');
  const pwd = document.getElementById('password').value;
  err.textContent = '';

  if (!pwd) { err.textContent='Please enter your password.'; return; }

  if (role === 'team') {
    const tid = document.getElementById('team-select').value;
    if (!tid) { err.textContent='Please select your team first.'; return; }
    btn.disabled=true; btn.textContent='Signing in…';

    // Build email: team_name lowercase with underscores + @bfl.in
    const tname  = teams.find(t=>t.id===tid)?.team_name || tid;
    const temail = tname.toLowerCase().replace(/\s+/g,'_') + '@bfl.in';
    const { error } = await sb.auth.signInWithPassword({
      email: temail, password: pwd
    });
    if (error) {
      err.textContent='❌ Wrong password. Contact the auctioneer.';
      btn.disabled=false; btn.textContent='Enter Auction Room'; return;
    }
    showWelcome('team', teams.find(t=>t.id===tid));

  } else {
    btn.disabled=true; btn.textContent='Signing in…';
    const { error } = await sb.auth.signInWithPassword({
      email:'admin@bfl.in', password: pwd
    });
    if (error) {
      err.textContent='❌ Incorrect auctioneer password.';
      btn.disabled=false; btn.textContent='Enter Auction Control'; return;
    }
    showWelcome('admin', null);
  }
}

async function showWelcome(userRole, team) {
  document.getElementById('login-screen').style.display   = 'none';
  document.getElementById('welcome-screen').style.display = '';
  spawnConfetti();

  if (userRole === 'admin') {
    document.getElementById('w-emoji').textContent = '⚙️';
    document.getElementById('w-title').textContent = 'Welcome, Auctioneer!';
    document.getElementById('w-team').textContent  = 'BFL IPL 2026 Control Room';
    document.getElementById('w-redir').textContent = 'Loading auction control…';
    document.getElementById('w-stats').innerHTML =
      '<div class="ws-chip"><strong>🔨</strong><span>Host</span></div>' +
      '<div class="ws-chip"><strong>Full</strong><span>Access</span></div>';
    animateBar(2000);
    setTimeout(() => window.location.href='admin.html', 2200);
    return;
  }

  const name = team?.team_name || 'Your Team';
  document.getElementById('w-emoji').textContent = emoji(name);
  document.getElementById('w-title').textContent = 'Welcome Back!';
  document.getElementById('w-team').textContent  = name;
  document.getElementById('w-redir').textContent = 'Entering auction room…';

  const c = code(name);
  if (c) {
    const logo = document.getElementById('w-ipl-logo');
    logo.src = IPL_LOGO(c); logo.style.display='block';
    logo.onload = () => logo.classList.add('loaded');
  }

  // Fetch stats from DB
  try {
    const { data:td } = await sb.rpc('get_my_team');
    if (td?.found) {
      const purse  = Number(td.purse_remaining).toFixed(1);
      const rtmRem = Math.max(0, (td.rtm_cards_total||0)-(td.rtm_cards_used||0));
      document.getElementById('w-stats').innerHTML =
        `<div class="ws-chip"><strong>₹${purse}</strong><span>Purse (Cr)</span></div>` +
        `<div class="ws-chip"><strong>${td.player_count||0}/12</strong><span>Players</span></div>` +
        `<div class="ws-chip"><strong>${rtmRem}</strong><span>RTM Cards</span></div>`;
    }
  } catch(_) {}
  // Team users go to rules first — button there navigates to auction.html
}

function animateBar(ms) {
  const b = document.getElementById('w-bar');
  b.style.animation='none'; b.offsetHeight;
  b.style.animation=`bar-fill ${ms/1000}s ease forwards`;
}

async function autoRedirect(user) {
  if (user.app_metadata?.role==='admin' || user.email==='admin@bfl.in') { window.location.href='admin.html'; return; }
  const { data:t } = await sb.from('teams').select('id').eq('user_id',user.id).maybeSingle();
  if (t) { window.location.href='auction.html'; return; }
  await sb.auth.signOut();
}

function spawnConfetti() {
  const layer = document.getElementById('clayer');
  const cols  = ['#f0b429','#38a169','#3b82f6','#8b5cf6','#e53e3e','#f97316'];
  for (let i=0;i<55;i++) {
    const d = document.createElement('div');
    const s = 5+Math.random()*8;
    d.className = 'cdot';
    d.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*55}vh;width:${s}px;height:${s}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.7}s;animation-duration:${.7+Math.random()*.9}s;`;
    layer.appendChild(d);
    setTimeout(()=>d.remove(),2000);
  }
}

document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ── Rules carousel ──────────────────────────────────────────
const RULES = [
  {
    step: 'Overview',
    title: '🏏 Welcome to BFL IPL 2026 Auction',
    body: `You are a <strong>franchise owner</strong> competing to build the best IPL squad within your budget.
<ul>

let _rulesIdx = 0;

function showRules() {
  document.getElementById('ws-splash').style.display = 'none';
  document.getElementById('ws-rules').style.display  = '';
  _rulesIdx = 0;
  renderRulesCard();
}

function renderRulesCard() {
  const r   = RULES[_rulesIdx];
  const card = document.getElementById('rules-card');
  const dots = document.getElementById('rules-dots');
  const prev = document.getElementById('rules-prev');
  const next = document.getElementById('rules-next');

  card.innerHTML = `
    <div class="rules-step">${_rulesIdx + 1} of ${RULES.length} — ${r.step}</div>
    <div class="rules-title">${r.title}</div>
    <div class="rules-body">${r.body}</div>`;

  dots.innerHTML = RULES.map((_, i) =>
    `<div class="rules-dot${i === _rulesIdx ? ' active' : ''}"
       onclick="rulesGoTo(${i})"></div>`
  ).join('');

  prev.disabled = _rulesIdx === 0;

  if (_rulesIdx === RULES.length - 1) {
    next.textContent = '🏏 Enter Auction Room';
    next.classList.add('finish');
  } else {
    next.textContent = 'Next →';
    next.classList.remove('finish');
  }
}

function rulesNav(dir) {
  if (dir > 0 && _rulesIdx === RULES.length - 1) {
    window.location.href = 'auction.html';
    return;
  }
  _rulesIdx = Math.max(0, Math.min(RULES.length - 1, _rulesIdx + dir));
  renderRulesCard();
}

function rulesGoTo(idx) {
  _rulesIdx = idx;
  renderRulesCard();
}

// Keyboard nav in rules
document.addEventListener('keydown', e => {
  if (document.getElementById('ws-rules')?.style.display === 'none') return;
  if (document.getElementById('ws-rules')?.style.display === '') {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); rulesNav(1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); rulesNav(-1); }
  }
});

document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
